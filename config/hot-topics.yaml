# Hot Topics — Active Knowledge Crawling targets
#
# ユーザーが管理する能動的クローリング対象のトピック定義。
# shelley-active-crawl ジョブがこのファイルを読み、crawl_policy に従ってwikiを拡張する。
#
# フィールド:
#   slug:           wiki concepts/ スラッグ (必須)
#   title:          表示名 (必須)
#   crawl_policy:   クローリングポリシー (必須)
#     - prerequisites: 前提概念を探して取り込む
#     - laterals:     横方向の関連概念を探して取り込む
#     - deepdive:     トピック自体の最新動向・事例を深掘り
#     - monitor:      クローリングなし。trending監視のみ
#     - paused:       全く動作しない
#   priority:       high / medium / low (デフォルト: medium)
#   search_hints:   検索クエリのヒント (任意)
#   wiki_pages:     関連する既存wikiページ (任意、自動検出もする)
#   notes:          メモ (任意)
#   added:          追加日 (YYYY-MM-DD)
#   last_crawled:   最終クロール日 (ジョブが自動更新)

